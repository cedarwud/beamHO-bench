name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run stage validation gate
        run: npm run validate:stage

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            dist/sim-test-summary.json
            dist/validation-suite.json
            dist/validation-suite.csv
            dist/validation-gate-summary.json
            dist/runtime-parameter-audit-summary.json
          if-no-files-found: warn
